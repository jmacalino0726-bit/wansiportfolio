<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Layout</title>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
    }

    body {
        background: #ddd;
        padding: 20px;
    }

    .container {
        max-width: 900px;
        margin: auto;
    }

    .box {
        background: #666;
        color: black;
        padding: 20px;
        margin-bottom: 15px;
        text-align: center;
        font-size: 22px;
    }

 
    .top {
        display: flex;
        justify-content: space-between;
    }

    .top div {
        flex: 1;
    }

    .top .logo {
        text-align: left;
    }

    .top .nav {
        text-align: right;
    }

 
    .columns {
        display: flex;
        gap: 15px;
    }

    .columns .col {
        flex: 1;
        height: 200px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

</style>
</head>
<body>

<div class="container">

    <div class="box top">
        <div class="logo">Logo</div>
        <div class="nav">Navigation</div>
    </div>

    <div class="box">Header</div>

    <div class="box">Info Text Area</div>

    <div class="columns">
        <div class="box col">box1</div>
        <div class="box col">box2</div>
        <div class="box col">box3</div>
    </div>

    <div class="box">Footer</div>

</div>

</body>
</html>
