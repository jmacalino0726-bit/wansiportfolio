<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup Layout</title>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
    }

    body {
        background: #eef2f5;
    }

   


    .navbar {
        background: linear-gradient(to right, #4b0082, #7b2cbf);
        padding: 10px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: white;
    }

    .nav-left {
        font-weight: bold;
    }

    .nav-center {
        flex: 1;
        display: flex;
        justify-content: center;
    }

    .nav-center input {
        width: 60%;
        padding: 6px 10px;
        border-radius: 20px;
        border: none;
        outline: none;
    }

    .nav-right button {
        background: transparent;
        border: 1px solid white;
        color: white;
        padding: 6px 12px;
        cursor: pointer;
    }

    


    .wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        height: calc(100vh - 60px);
    }

    .card {
        background: #d9d9d9;
        padding: 20px;
        border: 4px solid black;
        width: 320px;
    }

    .form-row {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
    }

    .form-row input,
    .card input {
        width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid #aaa;
        outline: none;
    }

    .card input {
        margin-bottom: 10px;
    }

    .card button {
        width: 100%;
        padding: 10px;
        background: linear-gradient(to right, #1e3a8a, #2563eb);
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
    }
</style>
</head>
<body>


<div class="navbar">
    <div class="nav-left">Home</div>

    <div class="nav-center">
        <input type="text" placeholder="Search...">
    </div>

    <div class="nav-right">
        <button>Download</button>
    </div>
</div>


<div class="wrapper">
    <div class="card">
        <div class="form-row">
            <input type="text" placeholder="First name">
            <input type="text" placeholder="First name">
        </div>
        <input type="email" placeholder="Email">
        <button>Sign Up</button>
    </div>
</div>

</body>
</html>
